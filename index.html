<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>²²⁷VIP Secure</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
overflow:hidden;
}

/* vidéo fond */

video{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
z-index:-1;
}

/* boite */

.box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.7);
padding:40px;
border-radius:15px;
text-align:center;
width:320px;
}

/* logo animé */

.logo{
font-size:40px;
font-weight:bold;
animation:glow 2s infinite alternate;
}

@keyframes glow{

from{
color:#ffcc00;
text-shadow:0 0 10px #ffcc00;
}

to{
color:#00ffff;
text-shadow:0 0 20px #00ffff;
}

}

.viptext{
font-size:22px;
font-weight:bold;
margin-top:10px;
color:#00ffff;
text-shadow:0 0 15px #00ffff;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

input{
padding:12px;
width:80%;
border:none;
border-radius:8px;
text-align:center;
}

/* boutons */

button{
margin-top:10px;
padding:12px;
width:200px;
border:none;
border-radius:8px;
background:#ffcc00;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#ffaa00;
}

#site{
display:none;
margin-top:20px;
}

#msg{
color:red;
}

</style>

</head>

<body oncontextmenu="return false">

<video autoplay muted loop>

💻 LISTE VIP
</button>

</div>

</div>

/* anti inspect */

if(e.keyCode==123){
return false;
}

}

</script>

<p style="position:fixed;bottom:10px;width:100%;text-align:center;font-size:12px;color:white;opacity:0.7;">
site web by kawaki227
